<section class="profile-page">

<style>
.profile-page {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 120px 20px 60px;
}
.profile-card {
    width: 100%;
    max-width: 480px;
    background: rgba(10,10,25,0.85);
    border: 1px solid rgba(122,92,255,0.25);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px rgba(122,92,255,0.15);
    animation: fadeIn 0.5s ease;
}
.profile-banner {
    height: 100px;
    background: linear-gradient(135deg, #1a0a3a, #0a1a3a, #7a5cff33);
}
.profile-avatar-wrap {
    position: relative;
    width: 90px;
    margin: -45px auto 0;
}
.profile-avatar-wrap img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid #7a5cff;
    object-fit: cover;
    display: block;
    box-shadow: 0 0 20px rgba(122,92,255,0.5);
    transition: 0.3s;
}
.profile-avatar-wrap img:hover { box-shadow: 0 0 30px rgba(122,92,255,0.8); }
.avatar-edit {
    position: absolute;
    bottom: 0;
    right: 0;
    background: #7a5cff;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;
}
.avatar-edit:hover { background: #5f3bff; }
.avatar-edit i { width: 13px; height: 13px; color: white; }
.profile-status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
}
.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00e676;
    box-shadow: 0 0 6px #00e676;
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}
.profile-nick-wrap,
.profile-bio-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 20px;
    margin-top: 8px;
}
.profile-nick {
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 1px;
    margin: 0;
}
.profile-bio {
    font-size: 14px;
    opacity: 0.65;
    margin: 0;
    text-align: center;
}
.edit-inline {
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    padding: 2px;
    transition: 0.3s;
    display: flex;
    align-items: center;
}
.edit-inline:hover { color: #7a5cff; }
.edit-inline i { width: 14px; height: 14px; }
.profile-input {
    display: block;
    margin: 6px auto 0;
    width: calc(100% - 60px);
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(122,92,255,0.4);
    background: rgba(255,255,255,0.06);
    color: white;
    font-size: 14px;
    text-align: center;
    outline: none;
    transition: 0.3s;
}
.profile-input:focus {
    border-color: #7a5cff;
    box-shadow: 0 0 8px rgba(122,92,255,0.4);
}
.profile-socials {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 20px 30px 0;
}
.social-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 8px 14px;
    transition: 0.3s;
}
.social-item:hover {
    background: rgba(122,92,255,0.1);
    box-shadow: 0 0 10px rgba(122,92,255,0.2);
}
.social-item a {
    flex: 1;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}
.social-item a:hover { color: #7a5cff; }
.profile-stats {
    display: flex;
    justify-content: space-around;
    padding: 20px 30px;
    margin-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
}
.stat-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}
.stat-box span {
    font-size: 22px;
    font-weight: bold;
    color: #7a5cff;
}
.stat-box label {
    font-size: 11px;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.profile-actions {
    display: flex;
    gap: 10px;
    padding: 0 30px 25px;
    justify-content: center;
}
.btn-save, .btn-reset {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    transition: 0.3s;
}
.btn-save {
    background: linear-gradient(135deg, #7a5cff, #5f3bff);
    color: white;
    flex: 1;
}
.btn-save:hover {
    box-shadow: 0 0 15px rgba(122,92,255,0.5);
    transform: translateY(-2px);
}
.btn-reset {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.1);
}
.btn-reset:hover {
    background: rgba(255,50,50,0.15);
    color: #ff6b6b;
    border-color: #ff6b6b;
}
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(122,92,255,0.9);
    color: white;
    padding: 10px 24px;
    border-radius: 30px;
    font-size: 14px;
    opacity: 0;
    transition: 0.4s;
    z-index: 9999;
    pointer-events: none;
}
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
</style>

<!-- SCRIPT -->
<script>

// ❄️ NEVE
const container = document.querySelector(".snow-container");

for (let i = 0; i < 50; i++) {
    const flake = document.createElement("div");
    flake.classList.add("snowflake");
    flake.innerHTML = "•";

    flake.style.left = Math.random() * 100 + "vw";
    flake.style.animationDuration = (5 + Math.random() * 5) + "s";
    flake.style.fontSize = (5 + Math.random() * 10) + "px";

    container.appendChild(flake);
}

// 🎬 TRANSIÇÃO
const transition = document.querySelector(".transition");

window.addEventListener("load", () => {
    setTimeout(() => {
        transition.classList.remove("active");
    }, 100);
});

document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e) {

        const href = this.getAttribute("href");

        if (!href || href.startsWith("http")) return;

        e.preventDefault();

        transition.classList.add("active");

        setTimeout(() => {
            window.location.href = href;
        }, 500);
    });
});

// 📱 MENU
document.querySelector(".menu-toggle").onclick = () => {
    document.getElementById("menu").classList.toggle("active");
};

// 🔵 HIGHLIGHT
const menu = document.querySelector("#menu");
const highlight = menu.querySelector(".highlight");
const links = menu.querySelectorAll("a");

function moveHighlight(el) {
    const rect = el.getBoundingClientRect();
    const menuRect = menu.getBoundingClientRect();

    highlight.style.width = rect.width + "px";
    highlight.style.left = (rect.left - menuRect.left) + "px";
}

links.forEach(link => {
    link.addEventListener("mouseenter", () => {
        moveHighlight(link);
    });
});

lucide.createIcons();

// NOTIFICAÇÃO
function toggleNotif() {
    const box = document.getElementById("notifBox");
    box.classList.toggle("active");
}

// fechar clicando fora
document.addEventListener("click", function(e) {
    if (!e.target.closest(".notification-wrapper")) {
        document.getElementById("notifBox").classList.remove("active");
    }
});

// ===== PERFIL =====

const DEFAULTS = { nick: 'Usuário', bio: 'Minha frase aqui...', avatar: '', discord: '#', github: '#', youtube: '#' };

function loadProfile() {
    const d = JSON.parse(localStorage.getItem('sgProfile') || '{}');
    const p = Object.assign({}, DEFAULTS, d);

    document.getElementById('nickDisplay').textContent = p.nick;
    document.getElementById('bioDisplay').textContent = p.bio;

    if (p.avatar) document.getElementById('avatarImg').src = p.avatar;

    ['discord','github','youtube'].forEach(s => {
        const el = document.getElementById('link-' + s);
        el.href = p[s];
        el.textContent = p[s] === '#' ? s.charAt(0).toUpperCase() + s.slice(1) : p[s];
    });
}

function saveProfile() {
    const d = JSON.parse(localStorage.getItem('sgProfile') || '{}');
    localStorage.setItem('sgProfile', JSON.stringify(d));
    showToast('✅ Perfil salvo!');
}

function resetProfile() {
    if (!confirm('Redefinir perfil?')) return;
    localStorage.removeItem('sgProfile');
    loadProfile();
    showToast('🔄 Perfil redefinido');
}

function editField(field) {
    const display = document.getElementById(field + 'Display');
    const input   = document.getElementById(field + 'Input');
    const isHidden = input.classList.contains('hidden');

    if (isHidden) {
        input.value = display.textContent;
        input.classList.remove('hidden');
        input.focus();
        input.onblur = () => {
            const val = input.value.trim() || DEFAULTS[field];
            display.textContent = val;
            input.classList.add('hidden');
            const d = JSON.parse(localStorage.getItem('sgProfile') || '{}');
            d[field] = val;
            localStorage.setItem('sgProfile', JSON.stringify(d));
        };
        input.onkeydown = e => { if (e.key === 'Enter') input.blur(); };
    }
}

function editSocial(name) {
    const link = document.getElementById('link-' + name);
    const url  = prompt('URL do ' + name + ':', link.href === '#' ? '' : link.href);
    if (url === null) return;
    const val = url.trim() || '#';
    link.href = val;
    link.textContent = val === '#' ? name.charAt(0).toUpperCase() + name.slice(1) : val;
    const d = JSON.parse(localStorage.getItem('sgProfile') || '{}');
    d[name] = val;
    localStorage.setItem('sgProfile', JSON.stringify(d));
}

document.getElementById('avatarInput').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        document.getElementById('avatarImg').src = e.target.result;
        const d = JSON.parse(localStorage.getItem('sgProfile') || '{}');
        d.avatar = e.target.result;
        localStorage.setItem('sgProfile', JSON.stringify(d));
        // atualiza o ícone do header na mesma página
        if (typeof applyUserAvatar === 'function') applyUserAvatar();
    };
    reader.readAsDataURL(file);
});

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

loadProfile();

</script>
